document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"9f41ec49-4fa8-4cf4-a142-b9e598e269af\"><\u002Fscript>\n<\u002Fhead>\n<body>\n\n<x-dc>\n<helmet>\n<link rel=\"preconnect\" href=\"https://fonts.googleapis.com\">\n<link rel=\"preconnect\" href=\"https://fonts.gstatic.com\" crossorigin=\"\">\n\n<style>\n  *{box-sizing:border-box;margin:0;padding:0}\n  html,body{height:100%}\n  body{font-family:'Segoe UI','Segoe UI Web (West European)',-apple-system,BlinkMacSystemFont,Roboto,sans-serif;background:#ffffff;color:#242424;-webkit-font-smoothing:antialiased}\n  input,select,textarea,button{font-family:inherit;color:inherit}\n  ::placeholder{color:#707070}\n  input:focus,textarea:focus,select:focus{outline:none}\n  ::-webkit-scrollbar{width:10px;height:10px}\n  ::-webkit-scrollbar-thumb{background:#c7c7c7;border-radius:4px;border:3px solid #ffffff}\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"min-height:100vh;width:100%\">\n\n  <!-- ============ LOGIN ============ -->\n  <sc-if value=\"{{ showLogin }}\" hint-placeholder-val=\"{{ true }}\">\n  <div style=\"min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:radial-gradient(120% 90% at 50% 0%, #ffffff 0%, #f5f5f5 100%)\">\n    <div style=\"width:100%;max-width:440px\">\n      <div style=\"display:flex;align-items:center;gap:11px;margin-bottom:30px;justify-content:center\">\n        <div style=\"width:38px;height:38px;border-radius:4px;background:#0f6cbd;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:17px;letter-spacing:-0.5px\">S<\u002Fdiv>\n        <div style=\"font-weight:700;font-size:16px;letter-spacing:-0.2px\">Stakeholder Intelligence<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:#ffffff;border:1px solid #e0e0e0;border-radius:4px;padding:34px 32px;box-shadow:0 24px 60px -28px rgba(0,0,0,0.13)\">\n        <div style=\"font-weight:700;font-size:30px;line-height:1.1;letter-spacing:-0.3px;color:#242424\">One voice,<br>one source of truth.<\u002Fdiv>\n        <p style=\"margin-top:14px;font-size:14px;line-height:1.55;color:#616161\">Sign in with your Unilever email. Your role decides what you see — frictionless logging for the field, full risk visibility for leadership.<\u002Fp>\n        <div style=\"margin-top:22px;display:flex;align-items:center;gap:10px;border:1px solid #d1d1d1;background:#fafafa;border-radius:4px;padding:12px 14px\">\n          <div style=\"width:8px;height:8px;border-radius:50%;background:#107c10\"><\u002Fdiv>\n          <div style=\"font-size:14px;color:#424242\">you@unilever.com<\u002Fdiv>\n          <div style=\"margin-left:auto;font-size:11px;font-weight:600;color:#616161;background:#ebebeb;padding:3px 8px;border-radius:4px\">SSO<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"margin-top:22px;font-size:11px;font-weight:700;letter-spacing:0.6px;text-transform:uppercase;color:#707070\">Continue as — demo roles<\u002Fdiv>\n        <div style=\"margin-top:11px;display:flex;flex-direction:column;gap:9px\">\n          <button onclick=\"{{ loginField }}\" style=\"display:flex;align-items:center;gap:13px;text-align:left;width:100%;border:1px solid #e0e0e0;background:#ffffff;border-radius:4px;padding:13px 15px;cursor:pointer;transition:all .15s\" style-hover=\"border-color:#0f6cbd;background:#ebf3fc\">\n            <div style=\"width:40px;height:40px;border-radius:50%;background:#ebf3fc;color:#0f6cbd;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px\">CO<\u002Fdiv>\n            <div><div style=\"font-weight:600;font-size:14.5px\">Chidi Okonkwo<\u002Fdiv><div style=\"font-size:12.5px;color:#616161\">Area Sales Manager · Standard User<\u002Fdiv><\u002Fdiv>\n            <div style=\"margin-left:auto;color:#707070\">→<\u002Fdiv>\n          <\u002Fbutton>\n          <button onclick=\"{{ loginLeader }}\" style=\"display:flex;align-items:center;gap:13px;text-align:left;width:100%;border:1px solid #e0e0e0;background:#ffffff;border-radius:4px;padding:13px 15px;cursor:pointer;transition:all .15s\" style-hover=\"border-color:#0f6cbd;background:#ebf3fc\">\n            <div style=\"width:40px;height:40px;border-radius:50%;background:#fdf3f4;color:#b10e1c;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px\">ZO<\u002Fdiv>\n            <div><div style=\"font-weight:600;font-size:14.5px\">Zainab Obagun<\u002Fdiv><div style=\"font-size:12.5px;color:#616161\">Corporate Affairs Lead · Leadership<\u002Fdiv><\u002Fdiv>\n            <div style=\"margin-left:auto;color:#707070\">→<\u002Fdiv>\n          <\u002Fbutton>\n          <button onclick=\"{{ loginAdmin }}\" style=\"display:flex;align-items:center;gap:13px;text-align:left;width:100%;border:1px solid #e0e0e0;background:#ffffff;border-radius:4px;padding:13px 15px;cursor:pointer;transition:all .15s\" style-hover=\"border-color:#0f6cbd;background:#ebf3fc\">\n            <div style=\"width:40px;height:40px;border-radius:50%;background:#f7f4fb;color:#5c2e91;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px\">TA<\u002Fdiv>\n            <div><div style=\"font-weight:600;font-size:14.5px\">Tobi Adeniyi<\u002Fdiv><div style=\"font-size:12.5px;color:#616161\">Managing Director · Superadmin<\u002Fdiv><\u002Fdiv>\n            <div style=\"margin-left:auto;color:#707070\">→<\u002Fdiv>\n          <\u002Fbutton>\n          <button onclick=\"{{ loginHead }}\" style=\"display:flex;align-items:center;gap:13px;text-align:left;width:100%;border:1px solid #e0e0e0;background:#ffffff;border-radius:4px;padding:13px 15px;cursor:pointer;transition:all .15s\" style-hover=\"border-color:#0f6cbd;background:#ebf3fc\">\n            <div style=\"width:40px;height:40px;border-radius:50%;background:#dff3f3;color:#006666;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px\">FB<\u002Fdiv>\n            <div><div style=\"font-weight:600;font-size:14.5px\">Funke Bello<\u002Fdiv><div style=\"font-size:12.5px;color:#616161\">Head, Regulatory Affairs · Function lead<\u002Fdiv><\u002Fdiv>\n            <div style=\"margin-left:auto;color:#707070\">→<\u002Fdiv>\n          <\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"text-align:center;margin-top:18px;font-size:12px;color:#616161\">Unilever Nigeria · Corporate Affairs &amp; Sustainability<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ============ APP ============ -->\n  <sc-if value=\"{{ showApp }}\" hint-placeholder-val=\"{{ false }}\">\n  <div style=\"{{ appWrapStyle }}\">\n    <div style=\"{{ appFrameStyle }}\">\n\n      <!-- SIDEBAR (desktop) -->\n      <sc-if value=\"{{ isDesktop }}\" hint-placeholder-val=\"{{ true }}\">\n      <aside style=\"width:236px;flex:none;border-right:1px solid #e0e0e0;background:#fafafa;display:flex;flex-direction:column;padding:20px 14px\">\n        <div style=\"display:flex;align-items:center;gap:10px;padding:4px 8px 18px\">\n          <div style=\"width:30px;height:30px;border-radius:4px;background:#0f6cbd;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:14px\">S<\u002Fdiv>\n          <div style=\"font-weight:700;font-size:14.5px;letter-spacing:-0.2px\">SIS<\u002Fdiv>\n          <sc-if value=\"{{ showNotif }}\" hint-placeholder-val=\"{{ false }}\">\n          <button onclick=\"{{ toggleNotif }}\" style=\"margin-left:auto;display:flex;align-items:center;gap:5px;border-radius:4px;border:1px solid #e0e0e0;background:#ffffff;cursor:pointer;padding:5px 9px;font-size:11.5px;font-weight:600;color:#424242\" style-hover=\"background:#f0f0f0\">Activity<sc-if value=\"{{ hasUnread }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"{{ unreadStyle }}\">{{ unread }}<\u002Fspan><\u002Fsc-if><\u002Fbutton>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n        <nav style=\"display:flex;flex-direction:column;gap:3px\">\n          <button onclick=\"{{ goHome }}\" style=\"{{ navHomeStyle }}\"><span style=\"display:flex;width:18px;justify-content:center\">⌂<\u002Fspan>Home<\u002Fbutton>\n          <button onclick=\"{{ goDirectory }}\" style=\"{{ navDirStyle }}\"><span style=\"display:flex;width:18px;justify-content:center\">▤<\u002Fspan>Directory<\u002Fbutton>\n          <sc-if value=\"{{ isField }}\" hint-placeholder-val=\"{{ false }}\">\n          <button onclick=\"{{ goMine }}\" style=\"{{ navMineStyle }}\"><span style=\"display:flex;width:18px;justify-content:center\">◈<\u002Fspan>My Stakeholders<\u002Fbutton>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ showEscNav }}\" hint-placeholder-val=\"{{ false }}\">\n          <button onclick=\"{{ goEsc }}\" style=\"{{ navEscStyle }}\"><span style=\"display:flex;width:18px;justify-content:center\">⚑<\u002Fspan>Escalations<sc-if value=\"{{ hasEsc }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"{{ escCountStyle }}\">{{ escCount }}<\u002Fspan><\u002Fsc-if><\u002Fbutton>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ isAdminRole }}\" hint-placeholder-val=\"{{ false }}\">\n          <button onclick=\"{{ goAdmin }}\" style=\"{{ navAdminStyle }}\"><span style=\"display:flex;width:18px;justify-content:center\">⚙<\u002Fspan>Governance<sc-if value=\"{{ hasReq }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"{{ reqCountStyle }}\">{{ reqCount }}<\u002Fspan><\u002Fsc-if><\u002Fbutton>\n          <\u002Fsc-if>\n        <\u002Fnav>\n        <div style=\"margin-top:auto;border-top:1px solid #e0e0e0;padding-top:14px\">\n          <div style=\"display:flex;align-items:center;gap:10px;padding:4px 8px\">\n            <div style=\"{{ avatarStyle }}\">{{ initials }}<\u002Fdiv>\n            <div style=\"min-width:0\"><div style=\"font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ userName }}<\u002Fdiv><div style=\"font-size:11.5px;color:#616161\">{{ roleLabel }}<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n          <button onclick=\"{{ logout }}\" style=\"margin-top:8px;width:100%;text-align:left;padding:8px 10px;font-size:12.5px;color:#616161;background:none;border:none;border-radius:4px;cursor:pointer\" style-hover=\"background:#f5f5f5\">Sign out<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Faside>\n      <\u002Fsc-if>\n\n      <!-- MAIN COLUMN -->\n      <div style=\"flex:1;min-width:0;display:flex;flex-direction:column;background:#ffffff;position:relative\">\n\n        <!-- mobile top bar -->\n        <sc-if value=\"{{ isMobile }}\" hint-placeholder-val=\"{{ false }}\">\n        <header style=\"display:flex;align-items:center;gap:10px;padding:14px 16px;border-bottom:1px solid #e0e0e0;background:#fafafa\">\n          <div style=\"width:26px;height:26px;border-radius:4px;background:#0f6cbd;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:12px\">S<\u002Fdiv>\n          <div style=\"font-weight:700;font-size:14px\">{{ screenTitle }}<\u002Fdiv>\n          <sc-if value=\"{{ showNotif }}\" hint-placeholder-val=\"{{ false }}\">\n          <button onclick=\"{{ toggleNotif }}\" style=\"margin-left:auto;display:flex;align-items:center;gap:5px;border-radius:4px;border:1px solid #e0e0e0;background:#ffffff;cursor:pointer;padding:5px 8px;font-size:11.5px;font-weight:600;color:#424242\">Activity<sc-if value=\"{{ hasUnread }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"{{ unreadStyle }}\">{{ unread }}<\u002Fspan><\u002Fsc-if><\u002Fbutton>\n          <\u002Fsc-if>\n          <div style=\"{{ avatarStyleSm }}\">{{ initials }}<\u002Fdiv>\n        <\u002Fheader>\n        <\u002Fsc-if>\n\n        <main style=\"{{ mainScrollStyle }}\">\n\n          <!-- ===== HOME: LEADERSHIP ===== -->\n          <sc-if value=\"{{ showLeaderHome }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"max-width:980px;margin:0 auto\">\n            <div style=\"display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap\">\n              <div>\n                <div style=\"display:flex;align-items:center;gap:10px;flex-wrap:wrap\"><div style=\"font-weight:700;font-size:27px;letter-spacing:-0.3px;color:#242424\">{{ greeting }}, {{ firstName }}<\u002Fdiv><sc-if value=\"{{ isHeadHome }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"font-size:12px;font-weight:700;padding:4px 11px;border-radius:4px;background:#dff3f3;color:#005a5a\">{{ headFnLabel }}<\u002Fspan><\u002Fsc-if><\u002Fdiv>\n                <div style=\"margin-top:4px;font-size:14px;color:#616161\">{{ todayLabel }} · {{ riskLine }}<\u002Fdiv>\n              <\u002Fdiv>\n              <button onclick=\"{{ openLog }}\" style=\"display:flex;align-items:center;gap:8px;background:#0f6cbd;color:#fff;border:none;border-radius:4px;padding:11px 16px;font-weight:600;font-size:13.5px;cursor:pointer;box-shadow:0 8px 20px -10px rgba(0,0,0,0.14)\" style-hover=\"background:#115ea3\"><span style=\"font-size:16px;line-height:1\">＋<\u002Fspan>Log engagement<\u002Fbutton>\n            <\u002Fdiv>\n\n            <!-- KPIs -->\n            <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:13px;margin-top:22px\">\n              <sc-for list=\"{{ kpis }}\" as=\"k\" hint-placeholder-count=\"4\">\n              <div style=\"background:#ffffff;border:1px solid #e0e0e0;border-radius:4px;padding:16px 16px 15px\">\n                <div style=\"display:flex;align-items:center;justify-content:space-between\"><div style=\"font-size:12.5px;color:#616161;font-weight:500\">{{ k.label }}<\u002Fdiv><span style=\"width:8px;height:8px;border-radius:50%;background:{{ k.dot }}\"><\u002Fspan><\u002Fdiv>\n                <div style=\"font-size:30px;font-weight:700;letter-spacing:-1px;margin-top:8px;line-height:1\">{{ k.value }}<\u002Fdiv>\n                <div style=\"font-size:12px;color:#616161;margin-top:5px\">{{ k.sub }}<\u002Fdiv>\n              <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n\n            <!-- Portfolio sentiment trend -->\n            <div style=\"background:#ffffff;border:1px solid #e0e0e0;border-radius:4px;padding:18px 20px;margin-top:16px\">\n              <div style=\"display:flex;align-items:center;gap:10px;flex-wrap:wrap\">\n                <div style=\"font-weight:700;font-size:14.5px\">Portfolio sentiment trend<\u002Fdiv>\n                <span style=\"display:inline-flex;align-items:center;gap:4px;font-size:11.5px;font-weight:700;padding:3px 9px;border-radius:4px;color:{{ portfolioDir.c }};background:{{ portfolioDir.bg }}\">{{ portfolioDir.a }} {{ portfolioDir.t }}<\u002Fspan>\n                <span style=\"margin-left:auto;font-size:12px;color:#616161\">Avg. relationship health over time<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"display:flex;gap:24px;margin-top:18px;flex-wrap:wrap\">\n                <div style=\"flex:1;min-width:240px\">\n                  <div style=\"display:flex;align-items:flex-end;gap:10px;height:96px\">\n                    <sc-for list=\"{{ trendBars }}\" as=\"b\" hint-placeholder-count=\"6\">\n                    <div style=\"flex:1;display:flex;flex-direction:column;justify-content:flex-end;height:100%\"><div style=\"width:100%;border-radius:4px 6px 0 0;background:{{ b.col }};height:{{ b.h }}%\"><\u002Fdiv><\u002Fdiv>\n                    <\u002Fsc-for>\n                  <\u002Fdiv>\n                  <div style=\"display:flex;gap:10px;margin-top:7px\">\n                    <sc-for list=\"{{ trendBars }}\" as=\"b\" hint-placeholder-count=\"6\"><div style=\"flex:1;text-align:center;font-size:10.5px;color:#616161\">{{ b.label }}<\u002Fdiv><\u002Fsc-for>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"flex:none;width:220px;display:flex;flex-direction:column;gap:9px;justify-content:center\">\n                  <div style=\"font-size:11px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;color:#616161\">Current mix<\u002Fdiv>\n                  <sc-for list=\"{{ mix }}\" as=\"m\" hint-placeholder-count=\"3\">\n                  <div style=\"display:flex;align-items:center;gap:9px\">\n                    <span style=\"width:9px;height:9px;border-radius:50%;flex:none;background:{{ m.col }}\"><\u002Fspan>\n                    <span style=\"font-size:12.5px;color:#424242;width:74px\">{{ m.label }}<\u002Fspan>\n                    <div style=\"flex:1;height:7px;border-radius:5px;background:#f5f5f5;overflow:hidden\"><div style=\"height:100%;border-radius:5px;background:{{ m.col }};width:{{ m.pct }}%\"><\u002Fdiv><\u002Fdiv>\n                    <span style=\"font-size:12px;font-weight:700;color:#424242;width:34px;text-align:right\">{{ m.pct }}%<\u002Fspan>\n                  <\u002Fdiv>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n\n            <!-- Activity by function (leadership / admin) -->\n            <sc-if value=\"{{ showFuncCard }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"background:#ffffff;border:1px solid #e0e0e0;border-radius:4px;overflow:hidden;margin-top:16px\">\n              <div style=\"display:flex;align-items:center;gap:9px;padding:15px 18px;border-bottom:1px solid #ebebeb\"><div style=\"font-weight:700;font-size:14.5px\">Activity by function<\u002Fdiv><div style=\"margin-left:auto;font-size:12px;color:#616161\">Click a function to filter the directory<\u002Fdiv><\u002Fdiv>\n              <div style=\"display:grid;grid-template-columns:1.6fr 0.8fr 0.8fr 0.8fr;padding:9px 18px;border-bottom:1px solid #f0f0f0\">\n                <div style=\"font-size:11px;font-weight:700;letter-spacing:0.4px;text-transform:uppercase;color:#616161\">Function<\u002Fdiv>\n                <div style=\"font-size:11px;font-weight:700;letter-spacing:0.4px;text-transform:uppercase;color:#616161;text-align:center\">Stakeholders<\u002Fdiv>\n                <div style=\"font-size:11px;font-weight:700;letter-spacing:0.4px;text-transform:uppercase;color:#616161;text-align:center\">High risk<\u002Fdiv>\n                <div style=\"font-size:11px;font-weight:700;letter-spacing:0.4px;text-transform:uppercase;color:#616161;text-align:center\">Escalations<\u002Fdiv>\n              <\u002Fdiv>\n              <sc-for list=\"{{ funcRows }}\" as=\"f\" hint-placeholder-count=\"4\">\n              <button onclick=\"{{ f.select }}\" style=\"display:grid;grid-template-columns:1.6fr 0.8fr 0.8fr 0.8fr;align-items:center;width:100%;text-align:left;padding:13px 18px;background:none;border:none;border-bottom:1px solid #f0f0f0;cursor:pointer\" style-hover=\"background:#fafafa\">\n                <div style=\"display:flex;align-items:center;gap:9px\"><span style=\"width:10px;height:10px;border-radius:3px;flex:none;background:{{ f.fg }}\"><\u002Fspan><span style=\"font-weight:600;font-size:13.5px\">{{ f.fn }}<\u002Fspan><\u002Fdiv>\n                <div style=\"text-align:center;font-size:15px;font-weight:700\">{{ f.count }}<\u002Fdiv>\n                <div style=\"text-align:center;font-size:15px;font-weight:700;color:#b10e1c\">{{ f.high }}<\u002Fdiv>\n                <div style=\"text-align:center;font-size:15px;font-weight:700;color:#b10e1c\">{{ f.esc }}<\u002Fdiv>\n              <\u002Fbutton>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <\u002Fsc-if>\n\n            <!-- Team (head of function) -->\n            <sc-if value=\"{{ showTeamCard }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"background:#ffffff;border:1px solid #e0e0e0;border-radius:4px;overflow:hidden;margin-top:16px\">\n              <div style=\"display:flex;align-items:center;gap:9px;padding:15px 18px;border-bottom:1px solid #ebebeb\"><div style=\"font-weight:700;font-size:14.5px\">{{ teamHeading }}<\u002Fdiv><div style=\"margin-left:auto;font-size:12px;color:#616161\">People reporting to you<\u002Fdiv><\u002Fdiv>\n              <sc-for list=\"{{ team }}\" as=\"m\" hint-placeholder-count=\"2\">\n              <button onclick=\"{{ m.open }}\" style=\"display:flex;align-items:center;gap:13px;width:100%;text-align:left;padding:13px 18px;background:none;border:none;border-bottom:1px solid #f0f0f0;cursor:pointer\" style-hover=\"background:#fafafa\">\n                <div style=\"width:38px;height:38px;flex:none;border-radius:50%;background:#dff3f3;color:#006666;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px\">{{ m.initials }}<\u002Fdiv>\n                <div style=\"flex:1;min-width:0\"><div style=\"font-weight:600;font-size:14px\">{{ m.name }}<\u002Fdiv><div style=\"font-size:12px;color:#616161\">{{ m.title }}<\u002Fdiv><\u002Fdiv>\n                <div style=\"display:flex;align-items:center;gap:8px;flex:none\">\n                  <span style=\"font-size:12px;color:#616161\">{{ m.count }}<\u002Fspan>\n                  <sc-if value=\"{{ m.hasEsc }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"font-size:11px;font-weight:700;padding:3px 9px;border-radius:4px;background:#fdf3f4;color:#b10e1c\">⚑ {{ m.escLabel }}<\u002Fspan><\u002Fsc-if>\n                <\u002Fdiv>\n              <\u002Fbutton>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <\u002Fsc-if>\n\n            <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:16px;margin-top:16px;align-items:start\">\n              <!-- Escalation board -->\n              <div style=\"background:#ffffff;border:1px solid #e0e0e0;border-radius:4px;overflow:hidden\">\n                <div style=\"display:flex;align-items:center;gap:9px;padding:15px 18px;border-bottom:1px solid #ebebeb\">\n                  <span style=\"width:9px;height:9px;border-radius:50%;background:#d13438\"><\u002Fspan>\n                  <div style=\"font-weight:700;font-size:14.5px\">Escalation board<\u002Fdiv>\n                  <div style=\"margin-left:auto;font-size:12px;color:#6161 div style=\"font-weight:700;font-size:15px\">Engagement history<\u002Fdiv>\n              <button onclick=\"{{ openLog }}\" style=\"display:flex;align-items:center;gap:6px;background:#0f6cbd;color:#fff;border:none;border-radius:4px;padding:8px 13px;font-weight:600;font-size:12.5px;cursor:pointer\" style-hover=\"background:#115ea3\"><span style=\"font-size:14px;line-height:1\">＋<\u002Fspan>Log<\u002Fbutton>\n            <\u002Fdiv>\n            <div style=\"position:relative;padding-left:8px\">\n              <sc-for list=\"{{ sel.feed }}\" as=\"e\" hint-placeholder-count=\"3\">\n              <div style=\"display:flex;gap:14px;padding-bottom:16px\">\n                <div style=\"display:flex;flex-direction:column;align-items:center;flex:none\"><span style=\"width:11px;height:11px;border-radius:50%;background:{{ e.posDot }};border:2.5px solid #ffffff;box-shadow:0 0 0 1px {{ e.posDot }}\"><\u002Fspan><span style=\"flex:1;width:2px;background:#e0e0e0;margin-top:2px\"><\u002Fspan><\u002Fdiv>\n                <div style=\"flex:1;background:#ffffff;border:1px solid #e5e5e5;border-radius:4px;padding:13px 15px;margin-top:-4px\">\n                  <div style=\"display:flex;align-items:center;gap:8px;flex-wrap:wrap\"><span style=\"font-weight:600;font-size:13px\">{{ e.type }}<\u002Fspan><span style=\"font-size:11.5px;color:#616161\">· {{ e.owner }}<\u002Fspan><span style=\"margin-left:auto;font-size:11.5px;color:#616161\">{{ e.dateLong }}<\u002Fspan><\u002Fdiv>\n                  <div style=\"font-size:13.5px;color:#424242;line-height:1.5;margin-top:7px\">{{ e.note }}<\u002Fdiv>\n                  <sc-if value=\"{{ e.hasActions }}\" hint-placeholder-val=\"{{ false }}\">\n                  <div style=\"margin-top:9px;display:flex;align-items:flex-start;gap:7px;background:#ebf3fc;border-radius:4px;padding:8px 11px\"><span style=\"color:#0f6cbd;font-size:12px;margin-top:1px\">→<\u002Fspan><div style=\"font-size:12.5px;color:#115ea3;line-height:1.45\"><span style=\"font-weight:600\">Agreed:<\u002Fspan> {{ e.actions }}<\u002Fdiv><\u002Fdiv>\n                  <\u002Fsc-if>\n                  <div style=\"display:flex;gap:6px;margin-top:10px;flex-wrap:wrap\">\n                    <span style=\"font-size:10.5px;font-weight:700;padding:2px 7px;border-radius:4px;color:{{ e.riskFg }};background:{{ e.riskBg }}\">{{ e.risk }} risk<\u002Fspan>\n                    <span style=\"font-size:10.5px;font-weight:600;padding:2px 7px;border-radius:4px;color:{{ e.posFg }};background:{{ e.posBg }}\">{{ e.position }}<\u002Fspan>\n                    <sc-if value=\"{{ e.escalation }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"font-size:10.5px;font-weight:700;padding:2px 7px;border-radius:4px;color:#b10e1c;background:#fdf3f4\">⚑ Escalated<\u002Fspan><\u002Fsc-if>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <!-- ===== GOVERNANCE (ADMIN) ===== -->\n          <sc-if value=\"{{ showAdmin }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"max-width:880px;margin:0 auto\">\n            <div style=\"font-weight:700;font-size:21px;letter-spacing:-0.4px\">Governance<\u002Fdiv>\n            <div style=\"font-size:13px;color:#616161;margin-top:2px\">Keep the master directory clean and the system running.<\u002Fdiv>\n\n            <!-- Approval queue -->\n            <div style=\"margin-top:20px;background:#ffffff;border:1px solid #e0e0e0;border-radius:4px;overflow:hidden\">\n              <div style=\"display:flex;align-items:center;gap:9px;padding:15px 18px;border-bottom:1px solid #ebebeb\"><div style=\"font-weight:700;font-size:14.5px\">New stakeholder requests<\u002Fdiv><span style=\"{{ reqCountStyle }}\">{{ reqCount }}<\u002Fspan><\u002Fdiv>\n              <sc-for list=\"{{ requests }}\" as=\"r\" hint-placeholder-count=\"2\">\n              <div style=\"display:flex;align-items:center;ga { taxGroups }}\" as=\"g\" hint-placeholder-count=\"3\">\n                <div style=\"margin-top:15px\">\n                  <div style=\"font-size:11px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;color:#616161\">{{ g.name }}<\u002Fdiv>\n                  <div style=\"display:flex;flex-wrap:wrap;gap:6px;margin-top:8px\">\n                    <sc-for list=\"{{ g.items }}\" as=\"it\" hint-placeholder-count=\"4\">\n                    <span style=\"display:inline-flex;align-items:center;gap:6px;font-size:12.5px;background:#f0f0f0;border:1px solid #e0e0e0;border-radius:4px;padding:4px 6px 4px 10px\">{{ it.label }}<button onclick=\"{{ it.remove }}\" style=\"border:none;background:none;color:#707070;cursor:pointer;font-size:14px;line-height:0.7;padding:0\" style-hover=\"color:#b10e1c\">×<\u002Fbutton><\u002Fspan>\n                    <\u002Fsc-for>\n                    <input value=\"{{ g.draft }}\" oninput=\"{{ g.onDraft }}\" onkeydown=\"{{ g.onKey }}\" placeholder=\"+ add\" style=\"width:78px;font-size:12.5px;background:#fafafa;border:1px dashed #c7c7c7;border-radius:4px;padding:4px 9px\">\n                  <\u002Fdiv>\n                <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n              <!-- Ownership -->\n              <div style=\"background:#ffffff;border:1px solid #e0e0e0;border-radius:4px;padding:17px 18px\">\n                <div style=\"font-weight:700;font-size:14.5px\">Ownership management<\u002Fdiv>\n                <div style=\"font-size:12px;color:#616161;margin-top:2px\">Bulk-reassign when an employee leaves.<\u002Fdiv>\n                <div style=\"margin-top:15px;font-size:11px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;color:#616161\">From (departing)<\u002Fdiv>\n                <select value=\"{{ reassignFrom }}\" onchange=\"{{ onReFrom }}\" style=\"margin-top:7px;width:100%;font-size:13.5px;background:#fafafa;border:1px solid #d1d1d1;border-radius:4px;padding:10px 11px\">\n                  <sc-for list=\"{{ employees }}\" as=\"emp\" hint-placeholder-count=\"4\"><option value=\"{{ emp }}\">{{ emp }}<\u002Foption><\u002Fsc-for>\n                <\u002Fselect>\n                <div style=\"text-align:center;font-size:16px;color:#707070;margin:8px 0\">↓<\u002Fdiv>\n                <div style=\"font-size:11px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;color:#616161\">To (replacement)<\u002Fdiv>\n                <select value=\"{{ reassignTo }}\" onchange=\"{{ onReTo }}\" style=\"margin-top:7px;width:100%;font-size:13.5px;background:#fafafa;border:1px solid #d1d1d1;border-radius:4px;padding:10px 11px\">\n                  <sc-for list=\"{{ employees }}\" as=\"emp\" hint-placeholder-count=\"4\"><option value=\"{{ emp }}\">{{ emp }}<\u002Foption><\u002Fsc-for>\n                <\u002Fselect>\n                <div style=\"margin-top:13px;font-size:12.5px;color:#616161;background:#f5f5f5;border-radius:4px;padding:10px 12px\">{{ reassignCount }} stakeholder(s) will move to {{ reassignTo }}.<\u002Fdiv>\n                <button onclick=\"{{ doReassign }}\" style=\"margin-top:11px;width:100%;background:#242424;color:#fff;border:none;border-radius:4px;padding:11px;font-weight:600;font-size:13.5px;cursor:pointer\" style-hover=\"background:#1a1a1a\">Reassign ownership<\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <!-- ===== ESCALATIONS ===== -->\n          <sc-if value=\"{{ showEscalations }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"max-width:880px;margin:0 auto\">\n            <div style=\"display:flex;align-items:flex-start;gap:13px\">\n              <div style=\"width:42px;height:42px;flex:none;border-radius:4px;background:#fdf3f4;color:#b10e1c;display:flex;align-items:center;justify-content:center;font-size:19px;line-height:1\">⚑<\u002Fdiv>\n              <div>\n                <div style=\"font-weight:700;font-size:21px;letter-spacin nter;font-weight:700;font-size:13px\">{{ s.mono }}<\u002Fdiv>\n                    <div style=\"flex:1;min-width:0\">\n                      <div style=\"display:flex;align-items:center;gap:8px\"><span style=\"font-weight:600;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ s.name }}<\u002Fspan><span style=\"{{ s.tierStyle }}\">{{ s.tier }}<\u002Fspan><\u002Fdiv>\n                      <div style=\"display:flex;align-items:center;gap:7px;margin-top:3px;flex-wrap:wrap\"><span style=\"font-size:11px;font-weight:600;padding:2px 8px;border-radius:4px;background:{{ s.funcBg }};color:{{ s.funcFg }}\">{{ s.func }}<\u002Fspan><span style=\"font-size:12px;color:#616161\">{{ s.owner }} · {{ s.age }}<\u002Fspan><\u002Fdiv>\n                    <\u002Fdiv>\n                    <span style=\"font-size:11px;font-weight:700;padding:4px 10px;border-radius:4px;background:{{ s.sevBg }};color:{{ s.sevFg }};flex:none\">{{ s.sevLabel }}<\u002Fspan>\n                  <\u002Fdiv>\n                  <div style=\"font-size:13.5px;color:#424242;line-height:1.5;margin-top:11px\">{{ s.note }}<\u002Fdiv>\n                  <div style=\"display:flex;align-items:center;gap:7px;margin-top:13px;flex-wrap:wrap\">\n                    <span style=\"font-size:11.5px;font-weight:700;padding:4px 9px;border-radius:4px;background:{{ s.riskBg }};color:{{ s.riskFg }}\">{{ s.risk }} risk<\u002Fspan>\n                    <span style=\"font-size:11.5px;font-weight:600;padding:4px 9px;border-radius:4px;background:{{ s.posBg }};color:{{ s.posFg }}\">{{ s.position }}<\u002Fspan>\n                    <sc-if value=\"{{ s.isCrit }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"font-size:11.5px;font-weight:700;padding:4px 9px;border-radius:4px;background:{{ s.statusBg }};color:{{ s.statusFg }}\">{{ s.status }}<\u002Fspan><\u002Fsc-if>\n                    <span style=\"font-size:12px;color:#616161;margin-left:2px\">{{ s.nextLabel }}<\u002Fspan>\n                  <\u002Fdiv>\n                  <sc-if value=\"{{ s.isCrit }}\" hint-placeholder-val=\"{{ false }}\">\n                  <div style=\"margin-top:14px;padding-top:13px;border-top:1px solid #f0f0f0\">\n                    <div style=\"display:flex;align-items:center\">\n                      <sc-for list=\"{{ s.steps }}\" as=\"stp\" hint-placeholder-count=\"4\">\n                      <div style=\"display:flex;align-items:center;flex:1;min-width:0\">\n                        <span style=\"{{ stp.dotStyle }}\"><\u002Fspan>\n                        <span style=\"flex:1;height:2px;background:{{ stp.lineCol }}\"><\u002Fspan>\n                      <\u002Fdiv>\n                      <\u002Fsc-for>\n                    <\u002Fdiv>\n                    <div style=\"display:flex;margin-top:6px\">\n                      <sc-for list=\"{{ s.steps }}\" as=\"stp\" hint-placeholder-count=\"4\"><div style=\"flex:1;font-size:9.5px;font-weight:600;color:{{ stp.txtCol }}\">{{ stp.label }}<\u002Fdiv><\u002Fsc-for>\n                    <\u002Fdiv>\n                    <sc-if value=\"{{ s.assignLine }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"font-size:12px;color:#616161;margin-top:10px\">{{ s.assignLine }}<\u002Fdiv><\u002Fsc-if>\n                    <sc-if value=\"{{ s.assignNote }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"display:flex;align-items:flex-start;gap:7px;margin-top:8px;background:#ebf3fc;border-radius:4px;padding:8px 11px\"><span style=\"color:#0f6cbd;font-size:12px;margin-top:1px\">“<\u002Fspan><div style=\"font-size:12.5px;color:#115ea3;line-height:1.45\">{{ s.assignNote }}<\u002Fdiv><\u002Fdiv><\u002Fsc-if>\n                  <\u002Fdiv>\n                  <\u002Fsc-if>\n                  <div style=\"display:flex;gap:6px;margin-top:13px;flex-wrap:wrap;align-items:center\">\n                    <button onclick=\"{{ s.open }}\" style=\"background:none;border:1px solid #d1d1d1;color:#616161;font-weight:600;font-size:12.5px;padding:8px 12px;border-radius:4px;cursor:poin \"{{ lf.stakeholderId }}\" onchange=\"{{ onLogStake }}\" style=\"margin-top:7px;width:100%;font-size:14.5px;background:#ffffff;border:1px solid #d1d1d1;border-radius:4px;padding:12px 12px\">\n            <option value=\"\">Select a stakeholder…<\u002Foption>\n            <sc-for list=\"{{ stakeOptions }}\" as=\"o\" hint-placeholder-count=\"6\"><option value=\"{{ o.id }}\">{{ o.name }}<\u002Foption><\u002Fsc-for>\n          <\u002Fselect>\n\n          <div style=\"display:flex;gap:10px;margin-top:15px\">\n            <div style=\"flex:1\"><label style=\"font-size:12px;font-weight:700;letter-spacing:0.4px;text-transform:uppercase;color:#616161\">Type<\u002Flabel>\n              <select value=\"{{ lf.type }}\" onchange=\"{{ onLogType }}\" style=\"margin-top:7px;width:100%;font-size:14px;background:#ffffff;border:1px solid #d1d1d1;border-radius:4px;padding:11px 11px\">\n                <sc-for list=\"{{ typeOptions }}\" as=\"t\" hint-placeholder-count=\"6\"><option value=\"{{ t }}\">{{ t }}<\u002Foption><\u002Fsc-for>\n              <\u002Fselect>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <sc-if value=\"{{ showLocation }}\" hint-placeholder-val=\"{{ false }}\">\n            <label style=\"display:block;margin-top:15px;font-size:12px;font-weight:700;letter-spacing:0.4px;text-transform:uppercase;color:#616161\">Where <span style=\"color:#c50f1f;font-weight:600;text-transform:none;letter-spacing:0\">·<\u002Fspan> location<\u002Flabel>\n            <input value=\"{{ lf.location }}\" oninput=\"{{ onLogLocation }}\" placeholder=\"e.g. Agbara plant – conference room B\" style=\"margin-top:7px;width:100%;font-size:14px;background:#ffffff;border:1px solid #d1d1d1;border-radius:4px;padding:12px 13px\">\n          <\u002Fsc-if>\n\n          <label style=\"display:block;margin-top:15px;font-size:12px;font-weight:700;letter-spacing:0.4px;text-transform:uppercase;color:#616161\">Anticipated outcome<\u002Flabel>\n          <select value=\"{{ lf.outcome }}\" onchange ;color:#616161\">Agreed actions<\u002Flabel>\n          <input value=\"{{ lf.actions }}\" oninput=\"{{ onLogActions }}\" placeholder=\"e.g. Send revised dossier by Friday\" style=\"margin-top:7px;width:100%;font-size:14px;background:#ffffff;border:1px solid #d1d1d1;border-radius:4px;padding:12px 13px\">\n\n          <div style=\"margin-top:11px\"><label style=\"font-size:12px;font-weight:700;letter-spacing:0.4px;text-transform:uppercase;color:#616161\">Next engagement date<\u002Flabel>\n            <input type=\"date\" value=\"{{ lf.nextDate }}\" onchange=\"{{ onLogNext }}\" style=\"margin-top:7px;width:100%;font-size:14px;background:#ffffff;border:1px solid #d1d1d1;border-radius:4px;padding:11px 13px\">\n          <\u002Fdiv>\n\n          <button onclick=\"{{ toggleEsc }}\" style=\"{{ escToggleStyle }}\">\n            <span style=\"{{ escDotStyle }}\"><\u002Fspan>\n            <div style=\"text-align:left\"><div style=\"font-weight:600;font-size:14px\">Escalation required<\u002Fdiv><div style=\"font-size:12px;opacity:0.8\">Alert leadership immediately<\u002Fdiv><\u002Fdiv>\n            <span style=\"{{ escSwitchStyle }}\"><span style=\"{{ escKnobStyle }}\"><\u002Fspan><\u002Fspan>\n          <\u002Fbutton>\n\n          <div style=\"display:flex;gap:10px;margin-top:20px\">\n            <button onclick=\"{{ closeModal }}\" style=\"flex:none;padding:13px 18px;background:#f5f5f5;border:none;border-radius:4px;font-weight:600;font-size:14px;color:#424242;cursor:pointer\">Cancel<\u002Fbutton>\n            <button onclick=\"{{ submitLog }}\" style=\"{{ submitStyle }}\">{{ submitLabel }}<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ===== REQUEST MODAL ===== -->\n    <sc-if value=\"{{ showReqModal }}\" hint-placeholder-val=\"{{ false }}\">\n    <div onclick=\"{{ closeModal }}\" style=\"position:fixed;inset:0;z-index:80;background:rgba(0,0,0,0.4);backdrop-filter:blur(3px);display:flex;align-items:center;justify-content:center;padding:20px\">\n      <div onclick=\"{{ stop }}\" style=\"background:#ffffff;width:100%;max-width:460px;border-radius:4px;box-shadow:0 30px 70px -25px rgba(0,0,0,0.22)\">\n        <div style=\"display:flex;align-items:center;padding:18px 22px 14px;border-bottom:1px solid #e5e5e5\">\n          <div><div style=\"font-weight:700;font-size:17px;letter-spacing:-0.3px\">Request new stakeholder<\u002Fdiv><div style=\"font-size:12px;color:#616161;margin-top:2px\">Goes to an admin — prevents duplicates.<\u002Fdiv><\u002Fdiv>\n          <button onclick=\"{{ closeModal }}\" style=\"margin-left:auto;background:none;border:none;font-size:22px;line-height:0.6;color:#616161;cursor:pointer\">×<\u002Fbutton>\n        <\u002Fdiv>\n        <div style=\"padding:18px 22px 24px\">\n          <label style=\"font-size:12px;font-weight:700;letter-spacing:0.4px;text-transform:uppercase;color:#616161\">Stakeholder name<\u002Flabel>\n          <input value=\"{{ rf.name }}\" oninput=\"{{ onReqName }}\" placeholder=\"e.g. Lagos State Waste Authority\" style=\"margin-top:7px;width:100%;font-size:14.5px;background:#ffffff;border:1px solid #d1d1d1;border-radius:4px;padding:12px 13px\">\n          <label style=\"display:block;margin-top:14px;font-size:12px;font-weight:700;letter-spacing:0.4px;text-transform:uppercase;color:#616161\">Category<\u002Flabel>\n          <select value=\"{{ rf.category }}\" onchange=\"{{ onReqCat }}\" style=\"margin-top:7px;width:100%;font-size:14px;background:#ffffff;border:1px solid #d1d1d1;border-radius:4px;padding:11px 12px\">\n            <sc-for list=\"{{ categoryList }}\" as=\"c\" hint-placeholder-count=\"4\"><option value=\"{{ c }}\">{{ c }}<\u002Foption><\u002Fsc-for>\n          <\u002Fselect>\n          <label style=\"display:block;margin-top:14px;font-size:12px;font-weight:700;letter-spacing:0.4px;text-transform:uppercase;color:#616161\">Why is this needed?<\u002Flabel>\n          <textarea value=\"{{ rf.reason }}\" oninput=\"{{ on urn{bg:'#fce8e6',fg:'#c5221f'};return{bg:'#feefc3',fg:'#7a5900'};}\n  fmtShort(iso){if(!iso)return'';const d=new Date(iso+'T00:00:00');return d.getDate()+' '+d.toLocaleString('en',{month:'short'});}\n  fmtLong(iso){if(!iso)return'';const d=new Date(iso+'T00:00:00');return d.toLocaleString('en',{day:'numeric',month:'short',year:'numeric'});}\n  dayOf(iso){return new Date(iso+'T00:00:00').getDate();}\n  monOf(iso){return new Date(iso+'T00:00:00').toLocaleString('en',{month:'short'});}\n  sScore(p){return p==='Supportive'?3:p==='Resistant'?1:2;}\n  rScore(r){return r==='High'?3:r==='Medium'?2:1;}\n  escStatusTok(s){if(s==='Acknowledged')return{fg:'#835b00',bg:'#fff9e5'};if(s==='Assigned')return{fg:'#0f6cbd',bg:'#ebf3fc'};if(s==='Intervened')return{fg:'#0e700e',bg:'#f1faf1'};return{fg:'#b10e1c',bg:'#fdf3f4'};}\n  pushNotif(n){this.setState(s=>({notifications:[{id:'n'+Date.now(),read:false,time:'just now',...n},...s.notifications]}));}\n\n  /* ---------- actions ---------- */\n  login=(role)=>this.setState({role,route:'home',selectedId:null,modal:null});\n  setRole=(role)=>this.setState({role,route:'home',selectedId:null});\n  go=(route)=>this.setState({route,modal:null,notifOpen:false});\n  openProfile=(id)=>this.setState({route:'profile',selectedId:id,modal:null,notifOpen:false});\n  toast=(msg)=>{this.setState({toast:msg,toastAction:null});clearTimeout(this._t);this._t=setTimeout(()=>this.setState({toast:null,toastAction:null}),2600);};\n  openLog=()=>{const pre=this.state.route==='profile'?this.state.selectedId:'';this.setState({modal:'log',lf:{stakeholderId:pre||'',type:'Virtual Meeting',location:'',outcome:'',note:'',position:'Neutral',risk:'Low',actions:'',nextDate:'',escalation:false}});};\n  openRequest=()=>this.setState({modal:'request',rf:{name:'',category:'Regulator',reason:''}});\n  closeModal=()=>this.setState({modal:null});\n  setLf=(k,v)=>this.setState(s=>({lf:{...s.lf,[k]:v}}));\n  setRf=(k,v)=>this.setState(s=>({rf:{...s.rf,[k]:v}}));\n  toggleDevice=()
