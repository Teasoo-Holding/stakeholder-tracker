  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';

      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);

    const templateData = JSON.parse(templateEl.textContent);
    const pages = templateData.pages;
    const entryId = templateData.entry;
    const pageIds = Object.keys(pages);

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : {};

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();

            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();

              chunks.push(value);

    // file:// document inherit a null origin, so crossorigin forces a CORS
    // fetch that SRI then rejects — the manifest bytes are ours; SRI protects
    // against CDN compromise, not this), and inject the page's own
    // window.__resources + the click interceptor into <head>. slice() rather

      // and tear down the wrapper. Non-# links navigate the parent to the
      // anchor's resolved href; #/… routes forward to the parent's hash only
      // when the id is one of this bundle's own pages (author #/… links from

      // the user to the entry page); plain #frag scrolls in place.

              'return;' +
            '}' +
            'e.preventDefault();' +
            'if (h.slice(0, 2) === "#/") {' +
              'var c = h.indexOf(":", 2);' +
              'var pid = c < 0 ? h.slice(2) : h.slice(2, c);' +
              'try { pid = decodeURIComponent(pid); } catch(err) {}' +
              'if (window.__bundler_pages.indexOf(pid) >= 0) { parent.location.hash = h; return; }' +
            '}' +
            'var t = h.length > 1 ? document.getElementById(h.slice(1)) : null;' +
            'if (t) t.scrollIntoView({behavior:"smooth"});' +
            'else scrollTo({top:0, behavior:"smooth"});' +

      // ids) before wrapping — same escape level as every sibling JSON island.

        headContent.split('</' + 'script').join('<\\/' + 'script') +
        '</' + 'script>';

      }

    }

    setStatus('Rendering...');

    if (pageIds.length === 1) {
      // Single page: the pre-crawl render path. Parse the template and swap the
      // root element. Scripts inserted via DOMParser/replaceWith are inert per

        const s = document.createElement('script');
        for (const a of old.attributes) s.setAttribute(a.name, a.value);
        s.textContent = old.textContent;
        // text/babel scripts with a src: fetch and inline. transformScriptTags
        // does XHR against the src, but blob:null/ from a file:// origin is
        // silently dropped. Inlining makes it a plain inline babel script,
        // which transformScriptTags handles unconditionally.

            s.textContent = await r.text();

        // data blocks per spec: the browser never fetches src and never fires
        // load/error, so awaiting would hang forever.

      // which fired before we swapped the document. Trigger manually if present.
      if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
        window.Babel.transformScriptTags();
      }
      return;
    }

    // Multi-page: render into a full-viewport srcdoc iframe so each page runs
    // in its own realm while staying same-origin with the parent (so asset
    // blob URLs load and parent.location is writable).
    var frame = document.createElement('iframe');
    frame.id = '__bundler_frame';
    frame.setAttribute('style', 'position:fixed;inset:0;width:100%;height:100%;border:0;background:#fff');
    document.body.appendChild(frame);

    function decode(s) {
      try { return decodeURIComponent(s); } catch (e) { return s; }
    }
    function route() {
      var h = (location.hash || '');
      if (h.slice(0, 2) !== '#/') return { id: entryId, anchor: '' };
      h = h.slice(2);
      var i = h.indexOf(':');
      return i < 0 ? { id: decode(h), anchor: '' }
                   : { id: decode(h.slice(0, i)), anchor: decode(h.slice(i + 1)) };
    }

    var current = null;
    var navGen = 0;
    function navigate() {
      var r = route();
      var id = Object.prototype.hasOwnProperty.call(pages, r.id) ? r.id : entryId;
      if (current === id) {
        // Same-page anchor change: the iframe's own hash handles this, so
        // normally we don't reach here. If we do (e.g. a programmatic
        // parent.location.hash change), nudge the iframe.
        var cw = frame.contentWindow;
        if (!cw) return;
        var el = r.anchor && cw.document.getElementById(r.anchor);
        if (el) el.scrollIntoView({ behavior: 'smooth' });
        else cw.scrollTo({ top: 0, behavior: 'smooth' });
        return;
      }
      current = id;
      var gen = ++navGen;
      frame.onload = function() {
        // One-shot: an iframe-internal navigation (form submit, page JS
        // location.href=) re-fires onload with the same gen; after that the
        // iframe may be cross-origin, and cw.* access would throw.
        frame.onload = null;
        if (gen !== navGen) return;
        var cw = frame.contentWindow;
        try { cw.document.title && (document.title = cw.document.title); } catch (e) {}
        var splash = document.getElementById('__bundler_thumbnail') ||
                     document.getElementById('__bundler_placeholder');
        if (splash) splash.remove();
        if (loading) loading.remove();
        var el = r.anchor && cw.document.getElementById(r.anchor);
        if (el) el.scrollIntoView();
        else cw.scrollTo(0, 0);
      };
      frame.srcdoc = pages[id];
    }

    navigate();
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }

  <script type="__bundler/template">
{"pages":{"_sis-fluent-export.dc":"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"14278fd7-4589-4a1d-8638-ba457aaf797e\"><\u002Fscript>\n<\u002Fhead>\n<body>\n\n<x-dc>\n<helmet>\n<link rel=\"preconnect\" href=\"https://fonts.googleapis.com\">\n<link rel=\"preconnect\" href=\"https://fonts.gstatic.com\" crossorigin=\"\">\n\n<style>\n  *{box-sizing:border-box;margin:0;padding:0}\n  html,body{height:100%}\n  body{font-family:'Segoe UI','Segoe UI Web (West European)',-apple-system,BlinkMacSystemFont,Roboto,sans-serif;background:#ffffff;color:#242424;-webkit-font-smoothing:antialiased}\n  input,select,textarea,button{font-family:inherit;color:inherit}\n  ::placeholder{color:#707070}\n  input:focus,textarea:focus,select:focus{outline:none}\n  ::-webkit-scrollbar{width:10px;height:10px}\n  ::-webkit-scrollbar-thumb{background:#c7c7c7;border-radius:4px;border:3px solid #ffffff}\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"min-height:100vh;width:100%\">\n\n  <!-- ============ LOGIN ============ -->\n  <sc-if value=\"{{ showLogin }}\" hint-placeholder-val=\"{{ true }}\">\n  <div style=\"min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:radial-gradient(120% 90% at 50% 0%, #ffffff 0%, #f5f5f5 100%)\">\n    <div style=\"width:100%;max-width:440px\">\n      <div style=\"display:flex;align-items:center;gap:11px;margin-bottom:30px;justify-content:center\">\n        <div style=\"width:38px;height:38px;border-radius:4px;background:#0f6cbd;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:17px;letter-spacing:-0.5px\">S<\u002Fdiv>\n        <div style=\"font-weight:700;font-size:16px;letter-spacing:-0.2px\">Stakeholder Intelligence<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:#ffffff;border:1px solid #e0e0e0;border-radius:4px;padding:34px 32px;box-shadow:0 24px 60px -28px rgba(0,0,0,0.13)\">\n        <div style=\"font-weight:700;font-size:30px;line-height:1.1;letter-spacing:-0.3px;color:#242424\">One voice,<br>one source of truth.<\u002Fdiv>\n        <p style=\"margin-top:14px;font-size:14px;line-height:1.55;color:#616161\">Sign in with your Unilever email. Your role decides what you see — frictionless logging for the field, full risk visibility for leadership.<\u002Fp>\n        <div style=\"margin-top:22px;display:flex;align-items:center;gap:10px;border:1px solid #d1d1d1;background:#fafafa;border-radius:4px;padding:12px 14px\">\n          <div style=\"width:8px;height:8px;border-radius:50%;background:#107c10\"><\u002Fdiv>\n          <div style=\"font-size:14px;color:#424242\">you@unilever.com<\u002Fdiv>\n          <div style=\"margin-left:auto;font-size:11px;font-weight:600;color:#616161;background:#ebebeb;padding:3px 8px;border-radius:4px\">SSO<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"margin-top:22px;font-size:11px;font-weight:700;letter-spacing:0.6px;text-transform:uppercase;color:#707070\">Continue as — demo roles<\u002Fdiv>\n        <div style=\"margin-top:11px;display:flex;flex-direction:column;gap:9px\">\n          <button onclick=\"{{ loginField }}\" style=\"display:flex;align-items:center;gap:13px;text-align:left;width:100%;border:1px solid #e0e0e0;background:#ffffff;border-radius:4px;padding:13px 15px;cursor:pointer;transition:all .15s\" style-hover=\"border-color:#0f6cbd;background:#ebf3fc\">\n            <div style=\"width:40px;height:40px;border-radius:50%;background:#ebf3fc;color:#0f6cbd;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px\">CO<\u002Fdiv>\n            <div><div style=\"font-weight:600;font-size:14.5px\">Chidi Okonkwo<\u002Fdiv><div style=\"font-size:12.5px;color:#616161\">Area Sales Manager · Standard User<\u002Fdiv><\u002Fdiv>\n            <div style=\"margin-left:auto;color:#707070\">→<\u002Fdiv>\n          <\u002Fbutton>\n          <button onclick=\"{{ loginLeader }}\" style=\"display:flex;align-items:center;gap:13px;text-align:left;width:100%;border:1px solid #e0e0e0;background:#ffffff;border-radius:4px;padding:13px 15px;cursor:pointer;transition:all .15s\" style-hover=\"border-color:#0f6cbd;background:#ebf3fc\">\n            <div style=\"width:40px;height:40px;border-radius:50%;background:#fdf3f4;color:#b10e1c;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px\">ZO<\u002Fdiv>\n            <div><div style=\"font-weight:600;font-size:14.5px\">Zainab Obagun<\u002Fdiv><div style=\"font-size:12.5px;color:#616161\">Corporate Affairs Lead · Leadership<\u002Fdiv><\u002Fdiv>\n            <div style=\"margin-left:auto;color:#707070\">→<\u002Fdiv>\n          <\u002Fbutton>\n          <button onclick=\"{{ loginAdmin }}\" style=\"display:flex;align-items:center;gap:13px;text-align:left;width:100%;border:1px solid #e0e0e0;background:#ffffff;border-radius:4px;padding:13px 15px;cursor:pointer;transition:all .15s\" style-hover=\"border-color:#0f6cbd;background:#ebf3fc\">\n            <div style=\"width:40px;height:40px;border-radius:50%;background:#f7f4fb;color:#5c2e91;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px\">TA<\u002Fdiv>\n            <div><div style=\"font-weight:600;font-size:14.5px\">Tobi Adeniyi<\u002Fdiv><div style=\"font-size:12.5px;color:#616161\">Managing Director · Superadmin<\u002Fdiv><\u002Fdiv>\n            <div style=\"margin-left:auto;color:#707070\">→<\u002Fdiv>\n          <\u002Fbutton>\n          <button onclick=\"{{ loginHead }}\" style=\"display:flex;align-items:center;gap:13px;text-align:left;width:100%;border:1px solid #e0e0e0;background:#ffffff;border-radius:4px;padding:13px 15px;cursor:pointer;transition:all .15s\" style-hover=\"border-color:#0f6cbd;background:#ebf3fc\">\n            <div style=\"width:40px;height:40px;border-radius:50%;background:#dff3f3;color:#006666;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px\">FB<\u002Fdiv>\n            <div><div style=\"font-weight:600;font-size:14.5px\">Funke Bello<\u002Fdiv><div style=\"font-size:12.5px;color:#616161\">Head, Regulatory Affairs · Function lead<\u002Fdiv><\u002Fdiv>\n            <div style=\"margin-left:auto;color:#707070\">→<\u002Fdiv>\n          <\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"text-align:center;margin-top:18px;font-size:12px;color:#616161\">Unilever Nigeria · Corporate Affairs &amp; Sustainability<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ============ APP ============ -->\n  <sc-if value=\"{{ showApp }}\" hint-placeholder-val=\"{{ false }}\">\n  <div style=\"{{ appWrapStyle }}\">\n    <div style=\"{{ appFrameStyle }}\">\n\n      <!-- SIDEBAR (desktop) -->\n      <sc-if value=\"{{ isDesktop }}\" hint-placeholder-val=\"{{ true }}\">\n      <aside style=\"width:236px;flex:none;border-right:1px solid #e0e0e0;background:#fafafa;display:flex;flex-direction:column;padding:20px 14px\">\n        <div style=\"display:flex;align-items:center;gap:10px;padding:4px 8px 18px\">\n          <div style=\"width:30px;height:30px;border-radius:4px;background:#0f6cbd;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:14px\">S<\u002Fdiv>\n          <div style=\"font-weight:700;font-size:14.5px;letter-spacing:-0.2px\">SIS<\u002Fdiv>\n          <sc-if value=\"{{ showNotif }}\" hint-placeholder-val=\"{{ false }}\">\n          <button onclick=\"{{ toggleNotif }}\" style=\"margin-left:auto;display:flex;align-items:center;gap:5px;border-radius:4px;border:1px solid #e0e0e0;background:#ffffff;cursor:pointer;padding:5px 9px;font-size:11.5px;font-weight:600;color:#424242\" style-hover=\"background:#f0f0f0\">Activity<sc-if value=\"{{ hasUnread }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"{{ unreadStyle }}\">{{ unread }}<\u002Fspan><\u002Fsc-if><\u002Fbutton>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n        <nav style=\"display:flex;flex-direction:column;gap:3px\">\n          <button onclick=\"{{ goHome }}\" style=\"{{ navHomeStyle }}\"><span style=\"display:flex;width:18px;justify-content:center\">⌂<\u002Fspan>Home<\u002Fbutton>\n          <button onclick=\"{{ goDirectory }}\" style=\"{{ navDirStyle }}\"><span style=\"display:flex;width:18px;justify-content:center\">▤<\u002Fspan>Directory<\u002Fbutton>\n          <sc-if value=\"{{ isField }}\" hint-placeholder-val=\"{{ false }}\">\n          <button onclick=\"{{ goMine }}\" style=\"{{ navMineStyle }}\"><span style=\"display:flex;width:18px;justify-content:center\">◈<\u002Fspan>My Stakeholders<\u002Fbutton>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ showEscNav }}\" hint-placeholder-val=\"{{ false }}\">\n          <button onclick=\"{{ goEsc }}\" style=\"{{ navEscStyle }}\"><span style=\"display:flex;width:18px;justify-content:center\">⚑<\u002Fspan>Escalations<sc-if value=\"{{ hasEsc }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"{{ escCountStyle }}\">{{ escCount }}<\u002Fspan><\u002Fsc-if><\u002Fbutton>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ isAdminRole }}\" hint-placeholder-val=\"{{ false }}\">\n          <button onclick=\"{{ goAdmin }}\" style=\"{{ navAdminStyle }}\"><span style=\"display:flex;width:18px;justify-content:center\">⚙<\u002Fspan>Governance<sc-if value=\"{{ hasReq }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"{{ reqCountStyle }}\">{{ reqCount }}<\u002Fspan><\u002Fsc-if><\u002Fbutton>\n          <\u002Fsc-if>\n        <\u002Fnav>\n        <div style=\"margin-top:auto;border-top:1px solid #e0e0e0;padding-top:14px\">\n          <div style=\"display:flex;align-items:center;gap:10px;padding:4px 8px\">\n            <div style=\"{{ avatarStyle }}\">{{ initials }}<\u002Fdiv>\n            <div style=\"min-width:0\"><div style=\"font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ userName }}<\u002Fdiv><div style=\"font-size:11.5px;color:#616161\">{{ roleLabel }}<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n          <button onclick=\"{{ logout }}\" style=\"margin-top:8px;width:100%;text-align:left;padding:8px 10px;font-size:12.5px;color:#616161;background:none;border:none;border-radius:4px;cursor:pointer\" style-hover=\"background:#f5f5f5\">Sign out<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Faside>\n      <\u002Fsc-if>\n\n      <!-- MAIN COLUMN -->\n      <div style=\"flex:1;min-width:0;display:flex;flex-direction:column;background:#ffffff;position:relative\">\n\n        <!-- mobile top bar -->\n        <sc-if value=\"{{ isMobile }}\" hint-placeholder-val=\"{{ false }}\">\n        <header style=\"display:flex;align-items:center;gap:10px;padding:14px 16px;border-bottom:1px solid #e0e0e0;background:#fafafa\">\n          <div style=\"width:26px;height:26px;border-radius:4px;background:#0f6cbd;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:12px\">S<\u002Fdiv>\n          <div style=\"font-weight:700;font-size:14px\">{{ screenTitle }}<\u002Fdiv>\n          <sc-if value=\"{{ showNotif }}\" hint-placeholder-val=\"{{ false }}\">\n          <button onclick=\"{{ toggleNotif }}\" style=\"margin-left:auto;display:flex;align-items:center;gap:5px;border-radius:4px;border:1px solid #e0e0e0;background:#ffffff;cursor:pointer;padding:5px 8px;font-size:11.5px;font-weight:600;color:#424242\">Activity<sc-if value=\"{{ hasUnread }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"{{ unreadStyle }}\">{{ unread }}<\u002Fspan><\u002Fsc-if><\u002Fbutton>\n          <\u002Fsc-if>\n          <div style=\"{{ avatarStyleSm }}\">{{ initials }}<\u002Fdiv>\n        <\u002Fheader>\n        <\u002Fsc-if>\n\n        <main style=\"{{ mainScrollStyle }}\">\n\n          <!-- ===== HOME: LEADERSHIP ===== -->\n          <sc-if value=\"{{ showLeaderHome }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"max-width:980px;margin:0 auto\">\n            <div style=\"display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap\">\n              <div>\n                <div style=\"display:flex;align-items:center;gap:10px;flex-wrap:wrap\"><div style=\"font-weight:700;font-size:27px;letter-spacing:-0.3px;color:#242424\">{{ greeting }}, {{ firstName }}<\u002Fdiv><sc-if value=\"{{ isHeadHome }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"font-size:12px;font-weight:700;padding:4px 11px;border-radius:4px;background:#dff3f3;color:#005a5a\">{{ headFnLabel }}<\u002Fspan><\u002Fsc-if><\u002Fdiv>\n                <div style=\"margin-top:4px;font-size:14px;color:#616161\">{{ todayLabel }} · {{ riskLine }}<\u002Fdiv>\n              <\u002Fdiv>\n              <button onclick=\"{{ openLog }}\" style=\"display:flex;align-items:center;gap:8px;background:#0f6cbd;color:#fff;border:none;border-radius:4px;padding:11px 16px;font-weight:600;font-size:13.5px;cursor:pointer;box-shadow:0 8px 20px -10px rgba(0,0,0,0.14)\" style-hover=\"background:#115ea3\"><span style=\"font-size:16px;line-height:1\">＋<\u002Fspan>Log engagement<\u002Fbutton>\n            <\u002Fdiv>\n\n            <!-- KPIs -->\n            <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:13px;margin-top:22px\">\n              <sc-for list=\"{{ kpis }}\" as=\"k\" hint-placeholder-count=\"4\">\n              <div style=\"background:#ffffff;border:1px solid #e0e0e0;border-radius:4px;padding:16px 16px 15px\">\n                <div style=\"display:flex;align-items:center;justify-content:space-between\"><div style=\"font-size:12.5px;color:#616161;font-weight:500\">{{ k.label }}<\u002Fdiv><span style=\"width:8px;height:8px;border-radius:50%;background:{{ k.dot }}\"><\u002Fspan><\u002Fdiv>\n                <div style=\"font-size:30px;font-weight:700;letter-spacing:-1px;margin-top:8px;line-height:1\">{{ k.value }}<\u002Fdiv>\n                <div style=\"font-size:12px;color:#616161;margin-top:5px\">{{ k.sub }}<\u002Fdiv>\n              <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n\n            <!-- Portfolio sentiment trend -->\n            <div style=\"background:#ffffff;border:1px solid #e0e0e0;border-radius:4px;padding:18px 20px;margin-top:16px\">\n              <div style=\"display:flex;align-items:center;gap:10px;flex-wrap:wrap\">\n                <div style=\"font-weight:700;font-size:14.5px\">Portfolio sentiment trend<\u002Fdiv>\n                <span style=\"display:inline-flex;align-items:center;gap:4px;font-size:11.5px;font-weight:700;padding:3px 9px;border-radius:4px;color:{{ portfolioDir.c }};background:{{ portfolioDir.bg }}\">{{ portfolioDir.a }} {{ portfolioDir.t }}<\u002Fspan>\n                <span style=\"margin-left:auto;font-size:12px;color:#616161\">Avg. relationship health over time<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"display:flex;gap:24px;margin-top:18px;flex-wrap:wrap\">\n                <div style=\"flex:1;min-width:240px\">\n                  <div style=\"display:flex;align-items:flex-end;gap:10px;height:96px\">\n                    <sc-for list=\"{{ trendBars }}\" as=\"b\" hint-placeholder-count=\"6\">\n                    <div style=\"flex:1;display:flex;flex-direction:column;justify-content:flex-end;height:100%\"><div style=\"width:100%;border-radius:4px 6px 0 0;background:{{ b.col }};height:{{ b.h }}%\"><\u002Fdiv><\u002Fdiv>\n                    <\u002Fsc-for>\n                  <\u002Fdiv>\n                  <div style=\"display:flex;gap:10px;margin-top:7px\">\n                    <sc-for list=\"{{ trendBars }}\" as=\"b\" hint-placeholder-count=\"6\"><div style=\"flex:1;text-align:center;font-size:10.5px;color:#616161\">{{ b.label }}<\u002Fdiv><\u002Fsc-for>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"flex:none;width:220px;display:flex;flex-direction:column;gap:9px;justify-content:center\">\n                  <div style=\"font-size:11px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;color:#616161\">Current mix<\u002Fdiv>\n                  <sc-for list=\"{{ mix }}\" as=\"m\" hint-placeholder-count=\"3\">\n                  <div style=\"display:flex;align-items:center;gap:9px\">\n                    <span style=\"width:9px;height:9px;border-radius:50%;flex:none;background:{{ m.col }}\"><\u002Fspan>\n                    <span style=\"font-size:12.5px;color:#424242;width:74px\">{{ m.label }}<\u002Fspan>\n                    <div style=\"flex:1;height:7px;border-radius:5px;background:#f5f5f5;overflow:hidden\"><div style=\"height:100%;border-radius:5px;background:{{ m.col }};width:{{ m.pct }}%\"><\u002Fdiv><\u002Fdiv>\n                    <span style=\"font-size:12px;font-weight:700;color:#424242;width:34px;text-align:right\">{{ m.pct }}%<\u002Fspan>\n                  <\u002Fdiv>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n\n            <!-- Activity by function (leadership / admin) -->\n            <sc-if value=\"{{ showFuncCard }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"background:#ffffff;border:1px solid #e0e0e0;border-radius:4px;overflow:hidden;margin-top:16px\">\n              <div style=\"display:flex;align-items:center;gap:9px;padding:15px 18px;border-bottom:1px solid #ebebeb\"><div style=\"font-weight:700;font-size:14.5px\">Activity by function<\u002Fdiv><div style=\"margin-left:auto;font-size:12px;color:#616161\">Click a function to filter the directory<\u002Fdiv><\u002Fdiv>\n              <div style=\"display:grid;grid-template-columns:1.6fr 0.8fr 0.8fr 0.8fr;padding:9px 18px;border-bottom:1px solid #f0f0f0\">\n                <div style=\"font-size:11px;font-weight:700;letter-spacing:0.4px;text-transform:uppercase;color:#616161\">Function<\u002Fdiv>\n                <div style=\"font-size:11px;font-weight:700;letter-spacing:0.4px;text-transform:uppercase;color:#616161;text-align:center\">Stakeholders<\u002Fdiv>\n                <div style=\"font-size:11px;font-weight:700;letter-spacing:0.4px;text-transform:uppercase;color:#616161;text-align:center\">High risk<\u002Fdiv>\n                <div style=\"font-size:11px;font-weight:700;letter-spacing:0.4px;text-transform:uppercase;color:#616161;text-align:center\">Escalations<\u002Fdiv>\n              <\u002Fdiv>\n              <sc-for list=\"{{ funcRows }}\" as=\"f\" hint-placeholder-count=\"4\">\n              <button onclick=\"{{ f.select }}\" style=\"display:grid;grid-template-columns:1.6fr 0.8fr 0.8fr 0.8fr;align-items:center;width:100%;text-align:left;padding:13px 18px;background:none;border:none;border-bottom:1px solid #f0f0f0;cursor:pointer\" style-hover=\"background:#fafafa\">\n                <div style=\"display:flex;align-items:center;gap:9px\"><span style=\"width:10px;height:10px;border-radius:3px;flex:none;background:{{ f.fg }}\"><\u002Fspan><span style=\"font-weight:600;font-size:13.5px\">{{ f.fn }}<\u002Fspan><\u002Fdiv>\n                <div style=\"text-align:center;font-size:15px;font-weight:700\">{{ f.count }}<\u002Fdiv>\n                <div style=\"text-align:center;font-size:15px;font-weight:700;color:#b10e1c\">{{ f.high }}<\u002Fdiv>\n                <div style=\"text-align:center;font-size:15px;font-weight:700;color:#b10e1c\">{{ f.esc }}<\u002Fdiv>\n              <\u002Fbutton>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <\u002Fsc-if>\n\n            <!-- Team (head of function) -->\n            <sc-if value=\"{{ showTeamCard }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"background:#ffffff;border:1px solid #e0e0e0;border-radius:4px;overflow:hidden;margin-top:16px\">\n              <div style=\"display:flex;align-items:center;gap:9px;padding:15px 18px;border-bottom:1px solid #ebebeb\"><div style=\"font-weight:700;font-size:14.5px\">{{ teamHeading }}<\u002Fdiv><div style=\"margin-left:auto;font-size:12px;color:#616161\">People reporting to you<\u002Fdiv><\u002Fdiv>\n              <sc-for list=\"{{ team }}\" as=\"m\" hint-placeholder-count=\"2\">\n              <button onclick=\"{{ m.open }}\" style=\"display:flex;align-items:center;gap:13px;width:100%;text-align:left;padding:13px 18px;background:none;border:none;border-bottom:1px solid #f0f0f0;cursor:pointer\" style-hover=\"background:#fafafa\">\n                <div style=\"width:38px;height:38px;flex:none;border-radius:50%;background:#dff3f3;color:#006666;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px\">{{ m.initials }}<\u002Fdiv>\n                <div style=\"flex:1;min-width:0\"><div style=\"font-weight:600;font-size:14px\">{{ m.name }}<\u002Fdiv><div style=\"font-size:12px;color:#616161\">{{ m.title }}<\u002Fdiv><\u002Fdiv>\n                <div style=\"display:flex;align-items:center;gap:8px;flex:none\">\n                  <span style=\"font-size:12px;color:#616161\">{{ m.count }}<\u002Fspan>\n                  <sc-if value=\"{{ m.hasEsc }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"font-size:11px;font-weight:700;padding:3px 9px;border-radius:4px;background:#fdf3f4;color:#b10e1c\">⚑ {{ m.escLabel }}<\u002Fspan><\u002Fsc-if>\n                <\u002Fdiv>\n              <\u002Fbutton>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <\u002Fsc-if>\n\n            <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:16px;margin-top:16px;align-items:start\">\n              <!-- Escalation board -->\n              <div style=\"background:#ffffff;border:1px solid #e0e0e0;border-radius:4px;overflow:hidden\">\n                <div style=\"display:flex;align-items:center;gap:9px;padding:15px 18px;border-bottom:1px solid #ebebeb\">\n                  <span style=\"width:9px;height:9px;border-radius:50%;background:#d13438\"><\u002Fspan>\n                  <div style=\"font-weight:700;font-size:14.5px\">Escalation board<\u002Fdiv>\n                  <div style=\"margin-le "{{ closeConfirm }}\" style=\"flex:none;padding:13px 18px;background:#f5f5f5;border:none;border-radius:4px;font-weight:600;font-size:14px;color:#424242;cursor:pointer\">Cancel<\u002Fbutton>\n          <button onclick=\"{{ doConfirm }}\" style=\"{{ confirmBtnStyle }}\">{{ confirmLabel }}<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- TOAST -->\n    <sc-if value=\"{{ hasToast }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"position:fixed;bottom:70px;left:50%;transform:translateX(-50%);z-index:90;background:#1a1a1a;color:#ffffff;font-size:13.5px;font-weight:500;padding:12px 18px;border-radius:4px;box-shadow:0 14px 34px -12px rgba(0,0,0,0.22);display:flex;align-items:center;gap:9px\"><span style=\"color:#6bb700\">✓<\u002Fspan>{{ toast }}<sc-if value=\"{{ hasToastAction }}\" hint-placeholder-val=\"{{ false }}\"><button onclick=\"{{ toastAction.fn }}\" style=\"margin-left:6px;background:none;border:none;color:#6bb700;font-weight:700;font-size:13px;cursor:pointer;text-decoration:underline\">{{ toastAction.label }}<\u002Fbutton><\u002Fsc-if><\u002Fdiv>\n    <\u002Fsc-if>\n\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  constructor(props){\n    super(props);\n    const E=(date,type,owner,note,position,risk,actions,esc)=>({date,type,owner,note,position,risk,actions,escalation:!!esc});\n    const S=(id,name,category,func,tier,owner,position,risk,esc,escNote,next,feed)=>({id,name,category,func,tier,owner,position,risk,escalation:esc,escNote,nextDate:next,feed});\n    this.state={\n      route:'login', role:'leader', device:'desktop',\n      query:'', filterCat:'All', escFilter:'All', filterTier:'All', sortBy:'risk',\n      selectedId:null, modal:null, toast:null, toastAction:null,\n      notifOpen:false, confirm:null, assignId:null, af:{assignee:'',due:'',note:''}, filterFunc:'All',\n      reassignFrom:'Bode Williams', reassignTo:'Amara Eze',\n      lf:{stakeholderId:'',type:'Meeting',note:'',position:'Neutral',risk:'Low',actions:'',nextDate:'',escalation:false},\n      rf:{name:'',category:'Regulator',reason:''},\n      taxDraft:{Category:'',Function:'','Engagement Type':''},\n      taxonomy:{Category:['Regulator','Government','Community','Commercial'],Function:['Compliance','Market Access','Reputation','Supply Chain'],'Engagement Type':['Meeting','Call','Email','Site Visit','Event']},\n      requests:[\n        {id:'r1',name:'Lagos State Waste Mgmt Authority',category:'Government',by:'Chidi Okonkwo',reason:'New levy on packaging'},\n        {id:'r2',name:'Consumer Advocacy Network NG',category:'Community',by:'Amara Eze',reason:'Rising social-media activity'}\n      ],\n      stakeholders:[\n        S('nafdac','NAFDAC','Regulator','Compliance','Tier 1','Zainab Obagun','Resistant','High',true,'Product registration backlog threatening Q3 launches; NAFDAC requesting additional dossiers.','2026-06-25',[\n          E('2026-06-18','Meeting','Zainab Obagun','DG\\u2019s office raised concerns over labelling of a new SKU; tone was firm. Registration of 3 SKUs paused pending review.','Resistant','High','Resubmit corrected dossiers; request follow-up meeting with technical team',true),\n          E('2026-05-30','Call','Bode Williams','Routine check-in on pending applications. Officer indicated backlog due to staffing.','Neutral','Medium','',false),\n          E('2026-04-22','Site Visit','Bode Williams','Facility inspection of Agbara plant. No major findings; minor documentation gaps noted.','Supportive','Low','Close out documentation gaps within 14 days',false)\n        ]),\n        S('agbara','Agbara Host Community','Community','Reputation','Tier 2','Chidi Okonkwo','Resistant','High',true,'Youth association demanding revised CSR commitments; threat of access disruption to plant.','2026-06-24',[\n          E('2026-06-19','Meeting','Chidi Okonkwo','Community youth leaders unhappy with delayed borehole project. Meeting ended without agreement.','Resistant','High','Escalate CSR budget approval; schedule town-hall within a week',true),\n          E('2026-05-12','Event','Chidi Okonkwo','Attended community Eid celebration; relationship warm at leadership level.','Supportive','Low','',false)\n        ]),\n        S('son','Standards Org. of Nigeria','Regulator','Compliance','Tier 1','Bode Williams','Neutral','Medium',false,'','2026-07-02',[\n          E('2026-06-10','Meeting','Bode Williams','Discussed MANCAP certification renewals. Process on track; officer cooperative.','Neutral','Medium','Submit renewal forms for 2 product lines',false),\n          E('2026-05-05','Email','Bode Williams','Shared updated quality test reports as requested.','Supportive','Low','',false)\n        ]),\n        S('fccpc','FCCPC','Regulator','Compliance','Tier 1','Zainab Obagun','Neutral','Medium',false,'','2026-06-29',[\n          E('2026-06-08','Call','Zainab Obagun','Clarified an advertising-claims query on a personal-care line. Officer satisfied with our response.','Neutral','Medium','Provide substantiation documents for product claims',false)\n        ]),\n        S('fmiti','Fed. Min. of Trade (FMITI)','Government','Market Access','Tier 1','Zainab Obagun','Supportive','Low',false,'','',[\n          E('2026-06-02','Meeting','Zainab Obagun','Positive discussion on local-sourcing incentives and export support. Minister supportive of our investment plans.','Supportive','Low','Share local-content roadmap',false)\n        ]),\n        S('nesrea','NESREA','Regulator','Compliance','Tier 2','Amara Eze','Neutral','Medium',false,'','2026-07-08',[\n          E('2026-06-04','Site Visit','Amara Eze','Environmental compliance audit. Effluent treatment within limits; recommended minor upgrades.','Neutral','Medium','Submit upgrade plan for effluent system',false)\n        ]),\n        S('customs','Nigerian Customs Service','Government','Supply Chain','Tier 2','Bode Williams','Neutral','High',false,'','2026-06-26',[\n          E('2026-06-15','Call','Bode Williams','Container clearance delays at Apapa affecting raw-material supply. Officer cited new inspection protocol.','Resistant','High','Engage command office to expedite priority containers',false)\n        ]),\n        S('artee','Artee Group (Distributor)','Commercial','Market Access','Tier 2','Chidi Okonkwo','Supportive','Low',false,'','2026-07-05',[\n          E('2026-06-12','Meeting','Chidi Okonkwo','Quarterly business review. Strong sell-through; agreed expanded shelf space for HPC range.','Supportive','Low','Finalise joint promo calendar for Q3',false)\n        ]),\n        S('lirs','Lagos Internal Revenue (LIRS)','Government','Compliance','Tier 2','Amara Eze','Neutral','Medium',false,'','2026-06-30',[\n          E('2026-06-09','Meeting','Amara Eze','Discussed PAYE reconciliation for the year. Officer professional; minor query on benefits.','Neutral','Medium','Provide reconciliation schedule',false)\n        ]),\n        S('lasepa','Lagos Min. of Environment','Government','Reputation','Tier 2','Amara Eze','Supportive','Low',false,'','',[\n          E('2026-05-28','Event','Amara Eze','Co-hosted a plastics-recycling roundtable. Commissioner praised our circular-economy pledge.','Supportive','Low','',false)\n        ])\n      ]\n    };\n    this.fieldUser='Chidi Okonkwo'; this.leaderUser='Zainab Obagun'; this.adminUser='Tobi Adeniyi';\n    this.headUser='Funke Bello'; this.headFunction='Regulatory Affairs';\n    this.PEOPLE={\n      'Chidi Okonkwo':{fn:'Commercial',title:'Area Sales Manager'},\n      'Bode Williams':{fn:'Regulatory Affairs',title:'Regulatory Affairs Officer'},\n      'Sade Lawal':{fn:'Regulatory Affairs',title:'Compliance Officer'},\n      'Ngozi Adeyemi':{fn:'Community & Sustainability',title:'Community Relations Officer'},\n      'Amara Eze':{fn:'Legal & Compliance',title:'Legal Counsel'},\n      'Zainab Obagun':{fn:'Corporate Affairs',title:'Corporate Affairs Lead'},\n      'Funke Bello':{fn:'Regulatory Affairs',title:'Head, Regulatory Affairs'},\n      'Tobi Adeniyi':{fn:'Executive',title:'Managing Director'}\n    };\n    this.FUNCTIONS=['Regulatory Affairs','Community & Sustainability','Commercial','Legal & Compliance'];\n    const OWN={nafdac:'Bode Williams',agbara:'Ngozi Adeyemi',son:'Bode Williams',fccpc:'Sade Lawal',fmiti:'Chidi Okonkwo',nesrea:'Ngozi Adeyemi',customs:'Chidi Okonkwo',artee:'Chidi Okonkwo',lirs:'Amara Eze',lasepa:'Ngozi Adeyemi'};\n    this.state.stakeholders.forEach(s=>{ if(OWN[s.id]) s.owner=OWN[s.id]; s.escStatus = s.escalation?'Open':''; s.escAssignee=''; s.escDue=''; s.escAssignNote=''; });\n    this.state.notifications=[\n      {id:'n1',kind:'escalation',title:'NAFDAC escalated to critical',body:'Registration backlog threatening Q3 launches.',time:'2h ago',read:false,go:{t:'profile',id:'nafdac'}},\n      {id:'n2',kind:'escalation',title:'Agbara Host Community flagged',body:'Youth association threatening plant access.',time:'5h ago',read:false,go:{t:'profile',id:'agbara'}},\n      {id:'n3',kind:'risk',title:'Customs: clearance delays',body:'High-risk supply disruption at Apapa port.',time:'1d ago',read:false,go:{t:'profile',id:'customs'}},\n      {id:'n4',kind:'good',title:'FMITI meeting positive',body:'Minister supportive of investment plans.',time:'3d ago',read:true,go:{t:'profile',id:'fmiti'}}\n    ];\n  }\n\n  /* ---------- helpers ---------- */\n  monoOf(n){const w=n.replace(/[^A-Za-z ]/g,'').trim().split(/\\s+/);if(w.length>=2)return (w[0][0]+w[1][0]).toUpperCase();return n.slice(0,2).toUpperCase();}\n  posTok(p){if(p==='Supportive')return{fg:'#0e700e',bg:'#f1faf1',dot:'#107c10'};if(p==='Resistant')return{fg:'#b10e1c',bg:'#fdf3f4',dot:'#d13438'};return{fg:'#835b00',bg:'#fff9e5',dot:'#db7500'};}\n  riskTok(r){if(r==='High')return{fg:'#b10e1c',bg:'#fdf3f4'};if(r==='Medium')return{fg:'#835b00',bg:'#fff9e5'};return{fg:'#0e700e',bg:'#f1faf1'};}\n  catTok(c){const m={Regulator:{bg:'#fdf3f4',fg:'#b10e1c'},Government:{bg:'#ebf3fc',fg:'#0f6cbd'},Community:{bg:'#f1faf1',fg:'#0e700e'},Commercial:{bg:'#f7f4fb',fg:'#5c2e91'}};return m[c]||{bg:'#ebebeb',fg:'#616161'};}\n  tierStyle(t){const base='font-size:10.5px;font-weight:700;padding:2px 7px;border-radius:4px;flex:none;';if(t==='Tier 1')return base+'color:#115ea3;background:#ebf3fc';if(t==='Tier 2')return base+'color:#616161;background:#ebebeb';return base+'color:#616161;background:#f0f0f0';}\n  mRisk(r){if(r==='High')return{bg:'#fce8e6',fg:'#c5221f'};if(r==='Medium')return{bg:'#feefc3',fg:'#7a5900'};return{bg:'#e6f4ea',fg:'#137333'};}\n  mPos(p){if(p==='Supportive')return{bg:'#e6f4ea',fg:'#137333'};if(p==='Resistant')return{bg:'#fce8e6',fg:'#c5221f'};return{bg:'#feefc3',fg:'#7a5900'};}\n  fmtShort(iso){if(!iso)return'';const d=new Date(iso+'T00:00:00');return d.getDate()+' '+d.toLocaleString('en',{month:'short'});}\n  fmtLong(iso){if(!iso)return'';const d=new Date(iso+'T00:00:00');return d.toLocaleString('en',{day:'numeric',month:'short',year:'numeric'});}\n  dayOf(iso){return new Date(iso+'T00:00:00').getDate();}\n  monOf(iso){return new Date(iso+'T00:00:00').toLocaleString('en',{month:'short'});}\n  sScore(p){return p==='Supportive'?3:p==='Resistant'?1:2;}\n  rScore(r){return r==='High'?3:r==='Medium'?2:1;}\n  escStatusTok(s){if(s==='Acknowledged')return{fg:'#835b00',bg:'#fff9e5'};if(s==='Assigned')return{fg:'#0f6cbd',bg:'#ebf3fc'};if(s==='Intervened')return{fg:'#0e700e',bg:'#f1faf1'};return{fg:'#b10e1c',bg:'#fdf3f4'};}\n  pushNotif(n){this.setState(s=>({notifications:[{id:'n'+Date.now(),read:false,time:'just now',...n},...s.notifications]}));}\n\n  /* ---------- actions ---------- */\n  login=(role)=>this.setState({role,route:'home',selectedId:null,modal:null});\n  setRole=(role)=>this.setState({role,route:'home',selectedId:null});\n  go=(route)=>this.setState({route,modal:null,notifOpen:false});\n  openProfile=(id)=>this.setState({route:'profile',selectedId:id,modal:null,notifOpen:false});\n  toast=(msg)=>{this.setState({toast:msg,toastAction:null});clearTimeout(this._t);this._t=setTimeout(()=>this.setState({toast:null,toastAction:null}),2600);};\n  openLog=()=>{const pre=this.state.route==='profile'?this.state.selectedId:'';this.setState({modal:'log',lf:{stakeholderId:pre||'',type:'Meeting',note:'',position:'Neutral',risk:'Low',actions:'',nextDate:'',escalation:false}});};\n  openRequest=()=>this.setState({modal:'request',rf:{name:'',category:'Regulator',reason:''}});\n  closeModal=()=>this.setState({modal:null});\n  setLf=(k,v)=>this.setState(s=>({lf:{...s.lf,[k]:v}}));\n  setRf=(k,v)=>this.setState(s=>({rf:{...s.rf,[k]:v}}));\n  toggleDevice=()=>this.setState(s=>({device:s.device==='desktop'?'mobile':'desktop'}));\n\n  submitLog=()=>{\n    const lf=this.state.lf; if(!lf.stakeholderId){this.toast('Pick a stakeholder first');return;}\n    const owner=this.currentName();\n    const eng={date:new Date().toISOString().slice(0,10),type:lf.type,owner,note:lf.note||'(no notes added)',position:lf.position,risk:lf.risk,actions:lf.actions,escalation:lf.escalation};\n    const target=this.state.stakeholders.find(x=>x.id===lf.stakeholderId);\n    this.setState(s=>({\n      stakeholders:s.stakeholders.map(st=>st.id===lf.stakeholderId?{...st,position:lf.position,risk:lf.risk,escalation:lf.escalation||st.escalation,escStatus:(lf.escalation&&!st.escalation)?'Open':st.escStatus,nextDate:lf.nextDate||st.nextDate,feed:[eng,...st.feed]}:st),\n      modal:null\n    }));\n    if(lf.escalation&&target&&!target.escalation)this.pushNotif({kind:'escalation',title:target.name+' escalated',body:(lf.note||'Escalation flagged').slice(0,80),go:{t:'profile',id:target.id}});\n    this.toast(lf.escalation?'Logged — leadership alerted ⚑':'Engagement logged');\n  };\n  submitRequest=()=>{\n    const rf=this.state.rf; if(!rf.name.trim()){this.toast('Add a name first');return;}\n    this.setState(s=>({requests:[...s.requests,{id:'r'+Date.now(),name:rf.name,category:rf.category,by:this.currentName(),reason:rf.reas
